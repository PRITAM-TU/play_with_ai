<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Login · AI Study Companion</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', sans-serif;
    }

    body {
        overflow: hidden;
        transition: background-color 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        background: #000000;
        height: 100vh;
    }

    /* Canvas background (dynamic cube particles) */
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 1;
        pointer-events: none;
    }

    /* glassmorphism card - premium login */
    .glass-login {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        text-align: center;
        background: rgba(10, 10, 10, 0.55);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border-radius: 48px;
        border: 1px solid rgba(255, 255, 255, 0.28);
        padding: 2.8rem 3.2rem;
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(255,255,255,0.1) inset;
        transition: all 0.3s ease;
        width: 420px;
        max-width: 88vw;
    }

    /* gradient glow text for heading */
    .glow-heading {
        font-size: 2.4rem;
        font-weight: 700;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, #FFFFFF, #BBBBFF, #E0E0FF);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 4s linear infinite, textGlow 2.5s ease-in-out infinite alternate;
        letter-spacing: -0.3px;
    }

    @keyframes shimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }

    @keyframes textGlow {
        0% { text-shadow: 0 0 2px rgba(255,255,255,0.2); }
        100% { text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 0 5px #aaaaff; }
    }

    /* form styling */
    .login-form {
        display: flex;
        flex-direction: column;
        gap: 1.4rem;
        margin-top: 0.5rem;
    }

    .input-group {
        position: relative;
        width: 100%;
    }

    .input-group input {
        width: 100%;
        padding: 14px 20px;
        background: rgba(255, 255, 255, 0.08);
        border: 1.5px solid rgba(255, 255, 255, 0.35);
        border-radius: 60px;
        font-size: 1rem;
        color: white;
        outline: none;
        transition: all 0.3s ease;
        backdrop-filter: blur(4px);
        font-weight: 500;
        letter-spacing: 0.3px;
    }

    .input-group input::placeholder {
        color: rgba(255, 255, 255, 0.6);
        font-weight: 400;
        transition: 0.2s;
    }

    .input-group input:focus {
        border-color: #ffffff;
        background: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 18px rgba(255,255,255,0.2);
        transform: scale(1.01);
    }

    /* premium login button */
    .login-btn {
        background: linear-gradient(95deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
        border: 1.5px solid rgba(255, 255, 255, 0.7);
        padding: 12px 20px;
        border-radius: 60px;
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 8px;
        backdrop-filter: blur(8px);
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
    }

    .login-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        transition: left 0.5s;
    }

    .login-btn:hover::before {
        left: 100%;
    }

    .login-btn:hover {
        transform: translateY(-3px) scale(1.02);
        background: rgba(255, 255, 255, 0.25);
        border-color: white;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
    }

    /* register link & extra */
    .extra-links {
        margin-top: 1.8rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
    }

    .extra-links a {
        color: rgba(255, 255, 255, 0.75);
        text-decoration: none;
        transition: 0.2s;
        border-bottom: 1px dotted transparent;
    }

    .extra-links a:hover {
        color: white;
        border-bottom-color: white;
    }

    /* dark/light toggle (same premium style) */
    .theme-toggle {
        position: fixed;
        top: 28px;
        right: 32px;
        z-index: 30;
        background: rgba(20, 20, 30, 0.6);
        backdrop-filter: blur(12px);
        border-radius: 60px;
        padding: 8px 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid rgba(255,255,255,0.3);
        cursor: pointer;
        transition: all 0.3s;
        font-weight: 500;
        font-size: 0.9rem;
        color: white;
    }

    .theme-toggle:hover {
        background: rgba(40,40,55,0.8);
        transform: scale(1.02);
    }

    .toggle-icon {
        font-size: 1.3rem;
    }

    /* light mode overrides */
    body.light-mode {
        background: #f0f3fa;
    }

    body.light-mode .glass-login {
        background: rgba(240, 242, 255, 0.55);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(0, 0, 0, 0.15);
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    body.light-mode .glow-heading {
        background: linear-gradient(135deg, #1e2a5e, #2c3e8f, #1a2c6e);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shimmer 4s linear infinite, textGlowLight 2s infinite alternate;
    }

    @keyframes textGlowLight {
        0% { text-shadow: 0 0 0px rgba(30,42,94,0.2); }
        100% { text-shadow: 0 0 12px rgba(44,62,143,0.4), 0 0 4px #a0b0ff; }
    }

    body.light-mode .input-group input {
        background: rgba(0, 0, 0, 0.06);
        border-color: rgba(0, 0, 0, 0.35);
        color: #111;
    }

    body.light-mode .input-group input::placeholder {
        color: rgba(0, 0, 0, 0.55);
    }

    body.light-mode .input-group input:focus {
        background: rgba(0, 0, 0, 0.1);
        border-color: #1e2a5e;
        box-shadow: 0 0 12px rgba(30,42,94,0.2);
    }

    body.light-mode .login-btn {
        background: rgba(0, 0, 0, 0.08);
        border-color: rgba(0, 0, 0, 0.5);
        color: #111;
    }

    body.light-mode .login-btn:hover {
        background: rgba(0, 0, 0, 0.2);
        border-color: #000;
        color: #000;
    }

    body.light-mode .extra-links a {
        color: rgba(0, 0, 0, 0.7);
    }

    body.light-mode .extra-links a:hover {
        color: #000;
        border-bottom-color: #000;
    }

    body.light-mode .theme-toggle {
        background: rgba(200, 210, 230, 0.7);
        border-color: rgba(0,0,0,0.2);
        color: #111;
    }

    body.light-mode canvas {
        opacity: 0.65;
    }

    /* back to home link (subtle) */
    .back-home {
        position: fixed;
        bottom: 24px;
        left: 24px;
        z-index: 30;
        background: rgba(0,0,0,0.35);
        backdrop-filter: blur(8px);
        padding: 8px 18px;
        border-radius: 40px;
        font-size: 0.8rem;
        text-decoration: none;
        color: rgba(255,255,255,0.8);
        border: 1px solid rgba(255,255,255,0.2);
        transition: 0.2s;
    }

    .back-home:hover {
        background: rgba(255,255,255,0.2);
        color: white;
    }

    body.light-mode .back-home {
        background: rgba(0,0,0,0.1);
        color: #111;
        border-color: rgba(0,0,0,0.2);
    }

    body.light-mode .back-home:hover {
        background: rgba(0,0,0,0.2);
        color: #000;
    }

    /* responsive adjustments */
    @media (max-width: 500px) {
        .glass-login {
            padding: 2rem 1.8rem;
            width: 90%;
        }
        .glow-heading {
            font-size: 1.9rem;
        }
        .theme-toggle {
            top: 18px;
            right: 18px;
            padding: 5px 14px;
        }
        .back-home {
            bottom: 18px;
            left: 18px;
            padding: 6px 14px;
        }
    }

    /* small loading / micro-interaction */
    .login-btn:active {
        transform: scale(0.98);
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Glassmorphic Login Card -->
<div class="glass-login">
    <h2 class="glow-heading">🔐 Welcome Back</h2>
    <form method="POST" class="login-form" id="loginForm">
        <div class="input-group">
            <input type="text" name="username" placeholder="Username or email" required autocomplete="username">
        </div>
        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn">✨ Login →</button>
        <div class="extra-links">
            <a href="/register">Create account</a>
            <a href="/forgot-password">Forgot password?</a>
        </div>
    </form>
</div>

<!-- Dark/Light Mode Toggle (same premium UI) -->
<div class="theme-toggle" id="themeToggle">
    <span class="toggle-icon" id="toggleIcon">🌙</span>
    <span id="toggleLabel">Dark Mode</span>
</div>

<!-- subtle back to home -->
<a href="/" class="back-home">← Back to Home</a>

<script>
    (function() {
        // ---------------------- CANVAS (Premium Black/White Cube Animation) -----------------
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener("resize", () => resizeCanvas());

        let cubes = [];

        class Cube {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 12 + 4;
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.angle = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.07;
                this.life = 1.0;
                this.decay = 0.965;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.rotationSpeed;
                this.size *= this.decay;
                this.life *= 0.97;
                if (this.size < 0.6) this.size = 0;
            }

            draw() {
                if (this.size <= 0.4) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                const isLight = document.body.classList.contains('light-mode');
                let alpha = Math.min(this.life * 0.85, 0.8);
                if (isLight) {
                    ctx.strokeStyle = `rgba(25, 30, 55, ${alpha * 0.9})`;
                } else {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                }
                ctx.lineWidth = Math.max(1.2, this.size * 0.22);
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                // extra glow effect for dark mode
                if (!isLight && this.size > 4) {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = "rgba(255,240,200,0.4)";
                    ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                    ctx.shadowBlur = 0;
                }
                ctx.restore();
            }
        }

        // Mouse move: spawn elegant cubes (glass trail)
        let lastSpawn = 0;
        window.addEventListener("mousemove", (e) => {
            const now = Date.now();
            if (now - lastSpawn > 18) {
                for (let i = 0; i < 2; i++) {
                    cubes.push(new Cube(e.clientX + (Math.random() - 0.5) * 9, e.clientY + (Math.random() - 0.5) * 9));
                }
                lastSpawn = now;
            } else if (Math.random() < 0.3) {
                cubes.push(new Cube(e.clientX, e.clientY));
            }
        });

        // Ambient particles for richer background
        setInterval(() => {
            if (cubes.length < 150) {
                let side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { x = Math.random() * canvas.width; y = -8; }
                else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 8; }
                else if (side === 1) { x = -8; y = Math.random() * canvas.height; }
                else { x = canvas.width + 8; y = Math.random() * canvas.height; }
                const ambientCube = new Cube(x, y);
                ambientCube.speedX = (Math.random() - 0.5) * 0.7;
                ambientCube.speedY = (Math.random() - 0.5) * 0.7;
                ambientCube.size = Math.random() * 8 + 3;
                cubes.push(ambientCube);
            }
        }, 900);

        function animateCanvas() {
            if (!ctx) return;
            const isLightMode = document.body.classList.contains('light-mode');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isLightMode) {
                ctx.fillStyle = "#f5f7fc";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // subtle light grid pattern
                ctx.strokeStyle = "rgba(0, 0, 0, 0.04)";
                ctx.lineWidth = 0.6;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i % canvas.height);
                    ctx.lineTo(canvas.width, i % canvas.height);
                    ctx.stroke();
                }
            } else {
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // premium star dust
                ctx.fillStyle = "rgba(255,255,255,0.06)";
                for (let i = 0; i < 140; i++) {
                    if (i % 5 === 0) continue;
                    ctx.beginPath();
                    ctx.arc((i * 311) % canvas.width, (i * 173) % canvas.height, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = cubes.length - 1; i >= 0; i--) {
                const c = cubes[i];
                c.update();
                c.draw();
                if (c.size <= 0.6 || c.x + c.size < -50 || c.x - c.size > canvas.width + 50 || c.y + c.size < -50 || c.y - c.size > canvas.height + 70) {
                    cubes.splice(i, 1);
                }
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // ---------------------- DARK/LIGHT MODE TOGGLE (same as main page) -----------------
        const themeToggle = document.getElementById('themeToggle');
        const toggleIconSpan = document.getElementById('toggleIcon');
        const toggleLabelSpan = document.getElementById('toggleLabel');

        function setTheme(isDark) {
            if (isDark) {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                toggleIconSpan.innerHTML = '🌙';
                toggleLabelSpan.innerText = 'Dark Mode';
                localStorage.setItem('login_theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                toggleIconSpan.innerHTML = '☀️';
                toggleLabelSpan.innerText = 'Light Mode';
                localStorage.setItem('login_theme', 'light');
            }
        }

        const savedTheme = localStorage.getItem('login_theme');
        if (savedTheme === 'light') {
            setTheme(false);
        } else {
            document.body.classList.add('dark-mode');
            setTheme(true);
        }

        themeToggle.addEventListener('click', () => {
            const isCurrentlyDark = !document.body.classList.contains('light-mode');
            setTheme(isCurrentlyDark);
        });

        // ---------------------- ADDITIONAL: Form micro interaction & cube effect on hover ----------
        const loginBtn = document.querySelector('.login-btn');
        const inputs = document.querySelectorAll('.input-group input');

        loginBtn.addEventListener('mouseenter', (e) => {
            const rect = loginBtn.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                cubes.push(new Cube(rect.left + rect.width/2 + (Math.random() - 0.5) * 40, rect.top + rect.height/2 + (Math.random() - 0.5) * 20));
            }
        });

        inputs.forEach(input => {
            input.addEventListener('focus', (e) => {
                const rect = input.getBoundingClientRect();
                for (let i = 0; i < 5; i++) {
                    cubes.push(new Cube(rect.left + 10 + Math.random() * rect.width, rect.top + rect.height/2 + (Math.random() - 0.5) * 12));
                }
            });
        });

        // Optional: Simple alert on form submit (only for demo, can be removed)
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            
            // just for simulation: show a subtle glass alert (doesn't break UX)
            const username = form.querySelector('input[name="username"]').value;
            if (username.trim() === "") return;
            // create a temporary floating message effect
            const msgDiv = document.createElement('div');
msgDiv.innerText = `✨ Welcome back, ${username} ✨`;

msgDiv.style.position = 'fixed';
msgDiv.style.bottom = '30%';
msgDiv.style.left = '50%';
msgDiv.style.transform = 'translateX(-50%)';
msgDiv.style.background = 'rgba(0,0,0,0.7)';
msgDiv.style.backdropFilter = 'blur(20px)';
msgDiv.style.padding = '12px 24px';
msgDiv.style.borderRadius = '50px';
msgDiv.style.color = 'white';
msgDiv.style.border = '1px solid rgba(255,255,255,0.3)';
msgDiv.style.zIndex = '1000';
msgDiv.style.fontWeight = '500';
msgDiv.style.fontSize = '0.9rem';
msgDiv.style.transition = 'opacity 0.6s ease';

document.body.appendChild(msgDiv);

// Fade out + redirect
setTimeout(() => {
    msgDiv.style.opacity = '0';

    setTimeout(() => {
        msgDiv.remove();

        // 🔥 REDIRECT TO DASHBOARD
        window.location.href = "/dashboard";

    }, 600);

}, 1800);
        });
    })();
</script>
</body>
</html>
