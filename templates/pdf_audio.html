<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PDF to Audio · AI Study Companion</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', sans-serif;
    }

    body {
        background: #000000;
        color: #ffffff;
        overflow-x: hidden;
        min-height: 100vh;
    }

    /* CANVAS BACKGROUND (PREMIUM CUBE ANIMATION) */
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
        z-index: 0;
        pointer-events: none;
    }

    /* HEADER WITH GLASSMORPHISM */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(16px) saturate(180%);
        background: rgba(0, 0, 0, 0.45);
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .logo {
        font-size: 1.5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #FFFFFF, #BBBBFF, #E0E0FF);
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }

    .back-btn {
        text-decoration: none;
        color: white;
        border: 1.5px solid rgba(255, 255, 255, 0.5);
        padding: 8px 24px;
        border-radius: 40px;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.05);
        font-weight: 500;
    }

    .back-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
    }

    /* MAIN CONTAINER */
    .container {
        position: relative;
        z-index: 10;
        max-width: 800px;
        margin: 0 auto;
        padding: 120px 30px 60px;
    }

    /* GLASS CARD */
    .glass-card {
        background: rgba(15, 15, 25, 0.55);
        backdrop-filter: blur(14px) saturate(180%);
        border-radius: 48px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 40px;
        transition: all 0.3s ease;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    h1 {
        font-size: 2.2rem;
        text-align: center;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #FFFFFF, #BBBBFF);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    .subtitle {
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 32px;
        font-size: 0.9rem;
    }

    /* UPLOAD AREA */
    .upload-area {
        border: 2px dashed rgba(255, 255, 255, 0.3);
        border-radius: 32px;
        padding: 45px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 24px;
    }

    .upload-area:hover {
        border-color: #a88eff;
        background: rgba(168, 142, 255, 0.08);
        transform: translateY(-2px);
    }

    .upload-icon {
        font-size: 3.5rem;
        margin-bottom: 12px;
    }

    .upload-area p {
        color: rgba(255, 255, 255, 0.7);
    }

    .file-name {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #a88eff;
        word-break: break-all;
    }

    input[type="file"] {
        display: none;
    }

    /* PROGRESS BAR (PROCESSING TIME) */
    .progress-container {
        margin: 20px 0;
        display: none;
    }

    .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #a88eff, #6c5ce7);
        border-radius: 10px;
        transition: width 0.3s ease;
    }

    .progress-text {
        display: flex;
        justify-content: space-between;
        margin-top: 10px;
        font-size: 0.8rem;
        opacity: 0.8;
    }

    /* BUTTONS */
    .btn {
        width: 100%;
        padding: 14px 24px;
        background: linear-gradient(95deg, #6c5ce7, #a88eff);
        border: none;
        border-radius: 60px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
    }

    .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* STATUS MESSAGES */
    .status {
        margin-top: 20px;
        padding: 12px 16px;
        border-radius: 60px;
        text-align: center;
        font-size: 0.9rem;
        display: none;
    }

    .status.loading {
        display: block;
        background: rgba(255, 193, 7, 0.15);
        border: 1px solid rgba(255, 193, 7, 0.4);
        color: #ffd966;
    }

    .status.success {
        display: block;
        background: rgba(76, 175, 80, 0.15);
        border: 1px solid rgba(76, 175, 80, 0.4);
        color: #a5d6a7;
    }

    .status.error {
        display: block;
        background: rgba(244, 67, 54, 0.15);
        border: 1px solid rgba(244, 67, 54, 0.4);
        color: #ef9a9a;
    }

    .status.info {
        display: block;
        background: rgba(100, 150, 255, 0.15);
        border: 1px solid rgba(100, 150, 255, 0.4);
        color: #aaccff;
    }

    /* RESULT CARD */
    .result-card {
        margin-top: 28px;
        padding: 24px;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 32px;
        display: none;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    audio {
        width: 100%;
        margin-bottom: 16px;
        border-radius: 40px;
        height: 48px;
    }

    audio::-webkit-media-controls-panel {
        background: rgba(30, 30, 50, 0.9);
    }

    .download-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        text-decoration: none;
        color: white;
        font-weight: 500;
        transition: all 0.2s;
    }

    .download-link:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
    }

    .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* Footer */
    .footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.4);
    }

    @media (max-width: 650px) {
        .container { padding: 100px 20px 40px; }
        .glass-card { padding: 25px; }
        h1 { font-size: 1.6rem; }
        .upload-area { padding: 30px 15px; }
    }
</style>
</head>
<body>

<!-- CANVAS BACKGROUND -->
<canvas id="canvas"></canvas>

<!-- HEADER -->
<div class="header">
    <div class="logo">📄🔊 PDF to Audio</div>
    <a href="/dashboard" class="back-btn">← Dashboard</a>
</div>

<!-- MAIN CONTENT -->
<div class="container">
    <div class="glass-card">
        <h1>📄 → 🔊 PDF to Audio</h1>
        <div class="subtitle">Extract text & convert to speech — AI-Powered TTS</div>

        <!-- UPLOAD AREA -->
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁🎧</div>
            <p>Click or drag & drop PDF here</p>
            <input type="file" id="pdfInput" accept=".pdf">
            <div class="file-name" id="fileName">No file selected</div>
        </div>

        <!-- PROGRESS BAR (PROCESSING TIME) -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                <span id="progressAction">⏳ Processing PDF...</span>
                <span id="progressTime">0.0s</span>
            </div>
        </div>

        <button class="btn" id="convertBtn">✨ Convert to Speech ✨</button>

        <div id="status" class="status"></div>

        <div id="result" class="result-card">
            <audio id="audioPlayer" controls></audio>
            <a id="downloadLink" class="download-link" download>⬇ Download Audio File (MP3)</a>
        </div>

        <div class="footer">Powered by AI TTS · High-quality neural voices</div>
    </div>
</div>

<script>
    // ========== PREMIUM CANVAS ANIMATION (CUBES) ==========
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let cubes = [];

    class Cube {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 12 + 4;
            this.speedX = (Math.random() - 0.5) * 1.5;
            this.speedY = (Math.random() - 0.5) * 1.5;
            this.angle = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.08;
            this.life = 1.0;
            this.decay = 0.965;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.angle += this.rotationSpeed;
            this.size *= this.decay;
            this.life *= 0.97;
            if (this.size < 0.5) this.size = 0;
        }
        draw() {
            if (this.size <= 0.4) return;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            let alpha = Math.min(this.life * 0.85, 0.8);
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineWidth = Math.max(1.2, this.size * 0.22);
            ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
            if (this.size > 5) {
                ctx.shadowBlur = 6;
                ctx.shadowColor = "rgba(255,240,200,0.4)";
                ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.shadowBlur = 0;
            }
            ctx.restore();
        }
    }

    let lastSpawn = 0;
    window.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastSpawn > 18) {
            for (let i = 0; i < 2; i++) {
                cubes.push(new Cube(e.clientX + (Math.random() - 0.5) * 12, e.clientY + (Math.random() - 0.5) * 12));
            }
            lastSpawn = now;
        } else if (Math.random() < 0.3) {
            cubes.push(new Cube(e.clientX, e.clientY));
        }
    });

    setInterval(() => {
        if (cubes.length < 160) {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            if (side === 0) { x = Math.random() * canvas.width; y = -10; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 10; }
            else if (side === 1) { x = -10; y = Math.random() * canvas.height; }
            else { x = canvas.width + 10; y = Math.random() * canvas.height; }
            const ambientCube = new Cube(x, y);
            ambientCube.speedX = (Math.random() - 0.5) * 0.6;
            ambientCube.speedY = (Math.random() - 0.5) * 0.6;
            ambientCube.size = Math.random() * 9 + 3;
            cubes.push(ambientCube);
        }
    }, 900);

    function animateCanvas() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
        for (let i = 0; i < 140; i++) {
            if (i % 5 === 0) continue;
            ctx.beginPath();
            ctx.arc((i * 311) % canvas.width, (i * 173) % canvas.height, 1.2, 0, Math.PI * 2);
            ctx.fill();
        }
        for (let i = cubes.length - 1; i >= 0; i--) {
            const c = cubes[i];
            c.update();
            c.draw();
            if (c.size <= 0.6 || c.x + c.size < -50 || c.x - c.size > canvas.width + 50 || c.y + c.size < -50 || c.y - c.size > canvas.height + 70) {
                cubes.splice(i, 1);
            }
        }
        requestAnimationFrame(animateCanvas);
    }
    animateCanvas();

    // ========== PDF TO AUDIO CONVERTER WITH PROCESSING TIME SIMULATION ==========
    const pdfInput = document.getElementById('pdfInput');
    const fileNameSpan = document.getElementById('fileName');
    const convertBtn = document.getElementById('convertBtn');
    const statusDiv = document.getElementById('status');
    const resultDiv = document.getElementById('result');
    const audioPlayer = document.getElementById('audioPlayer');
    const downloadLink = document.getElementById('downloadLink');
    const uploadArea = document.getElementById('uploadArea');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const progressAction = document.getElementById('progressAction');
    const progressTimeSpan = document.getElementById('progressTime');

    let selectedFile = null;

    // File selection preview
    pdfInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            const file = e.target.files[0];
            if (file.type === 'application/pdf') {
                selectedFile = file;
                fileNameSpan.textContent = `📄 ${file.name}`;
                fileNameSpan.style.color = '#a88eff';
            } else {
                selectedFile = null;
                fileNameSpan.textContent = '❌ Please select a valid PDF file';
                fileNameSpan.style.color = '#ef9a9a';
                pdfInput.value = '';
            }
        } else {
            selectedFile = null;
            fileNameSpan.textContent = 'No file selected';
        }
    });

    // Click upload area
    uploadArea.addEventListener('click', () => pdfInput.click());

    // Drag & drop
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#a88eff';
        uploadArea.style.background = 'rgba(168, 142, 255, 0.1)';
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = 'rgba(255, 255, 255, 0.3)';
        uploadArea.style.background = 'transparent';
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = 'rgba(255, 255, 255, 0.3)';
        uploadArea.style.background = 'transparent';
        
        const files = e.dataTransfer.files;
        if (files.length && files[0].type === 'application/pdf') {
            selectedFile = files[0];
            pdfInput.files = files;
            fileNameSpan.textContent = `📄 ${selectedFile.name}`;
            fileNameSpan.style.color = '#a88eff';
        } else {
            showStatus('Please drop a valid PDF file', 'error');
        }
    });

    function showStatus(msg, type) {
        statusDiv.textContent = msg;
        statusDiv.className = `status ${type}`;
        if (type !== 'loading') {
            setTimeout(() => {
                if (statusDiv.className === `status ${type}`) {
                    statusDiv.style.display = 'none';
                }
            }, 5000);
        }
    }

    

    // Alternative: Simulate actual API call (commented but ready for backend integration)
    // Uncomment this and comment the simulation above when backend is ready
 
    async function convertPDF() {
        if (!selectedFile) {
            showStatus('⚠️ Please select a PDF file first', 'error');
            return;
        }

        resultDiv.style.display = 'none';
        
        const formData = new FormData();
        formData.append('file', selectedFile);

        convertBtn.disabled = true;
        convertBtn.textContent = '⏳ Processing...';
        showStatus('<span class="spinner"></span> Extracting text & generating speech...', 'loading');

        try {
            const response = await fetch('/pdf-to-audio', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (data.success) {
                showStatus('✅ Conversion complete! Audio ready.', 'success');
                resultDiv.style.display = 'block';
                audioPlayer.src = data.audio_url;
                downloadLink.href = data.audio_url;
                audioPlayer.load();
            } else {
                showStatus('❌ Error: ' + (data.error || 'Unknown error'), 'error');
            }
        } catch (err) {
            console.error(err);
            showStatus('❌ Server error. Make sure backend is running', 'error');
        } finally {
            convertBtn.disabled = false;
            convertBtn.textContent = '✨ Convert to Speech ✨';
        }
    }
  

    convertBtn.addEventListener('click', convertPDF);

    // Add hover effect on glass card for cube spawn
    document.querySelectorAll('.glass-card, .upload-area').forEach(el => {
        el.addEventListener('mouseenter', (e) => {
            const rect = el.getBoundingClientRect();
            for(let i = 0; i < 3; i++) {
                cubes.push(new Cube(rect.left + rect.width/2 + (Math.random()-0.5)*40, rect.top + rect.height/2 + (Math.random()-0.5)*30));
            }
        });
    });
</script>
</body>
</html>
